<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arty Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}

body{
  background:#020202;
  color:#eaeaea;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 20%, rgba(59,130,246,0.1), transparent 45%);
  animation:moveLight 14s linear infinite;
  z-index:-1;
  pointer-events:none;
}

@keyframes moveLight{
  0%{transform:translate(0,0);}
  50%{transform:translate(-12%, -10%);}
  100%{transform:translate(0,0);}
}

/* loader */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader span{
  width:36px;
  height:36px;
  border:2px solid transparent;
  border-top:2px solid #3b82f6;
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

/* card */
.container{
  position:relative;
  width:320px;
  padding:40px 30px;
  border-radius:18px;
  text-align:center;

  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 20px 60px rgba(0,0,0,0.9);

  display:none;
  animation:fadeIn 0.9s ease forwards;
}

/* border glow */
.container::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1px;

  background:linear-gradient(120deg,
    transparent 30%,
    #3b82f688 45%,
    transparent 50%,
    #3b82f6cc 60%,
    transparent 70%
  );

  background-size:200% 200%;
  animation:borderFlow 8s linear infinite;

  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;

  pointer-events:none;
}

@keyframes borderFlow{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* grain */
.container::after{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:.05;
  pointer-events:none;
}

@keyframes fadeIn{
  0%{opacity:0;transform:translateY(40px) scale(.92);filter:blur(10px);}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
}

.profile-img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:1.5px solid rgba(255,255,255,0.3);
  margin-bottom:15px;
  transition:.3s;
}

.profile-img:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #3b82f6aa;
}

h1{font-size:22px;font-weight:600;}

.bio{
  font-size:13px;
  opacity:.6;
  margin:10px 0 20px;
}

.links{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 🔥 ปุ่มไฟฟ้า (เข้มขึ้น) */
.links a{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  padding:12px;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  font-size:14px;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);

  overflow:hidden;
  z-index:2;
  transition:.2s;
}

/* พลังงานวิ่ง (เข้มขึ้น) */
.links a::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 25%,
    rgba(59,130,246,0.4) 45%,
    rgba(59,130,246,0.6) 50%,
    rgba(59,130,246,0.4) 55%,
    transparent 75%
  );
  background-size:200% 100%;
  animation:energyFlow 3s linear infinite;
  opacity:0.7;
}

/* glow */
.links a::after{
  content:"";
  position:absolute;
  inset:0;
  box-shadow:0 0 12px rgba(59,130,246,0.3);
  opacity:0;
  transition:.3s;
}

.links a:hover::after{
  opacity:1;
}

/* hover */
.links a:hover{
  transform:translateY(-2px);
  background:rgba(59,130,246,0.12);
}

/* click */
.links a:active{
  transform:scale(.96);
}

/* animation */
@keyframes energyFlow{
  0%{background-position:0% 50%;}
  100%{background-position:200% 50%;}
}

.footer{
  margin-top:15px;
  font-size:11px;
  opacity:.3;
}
</style>
</head>

<body>

<div class="loader"><span></span></div>

<div class="container">

<img src="https://i.postimg.cc/L4Lp2kw0/myjpg.jpg" class="profile-img">

<h1>Arty Sataporn</h1>
<p class="bio">ความรักมันน่ากลัว เพราะไม่รู้ว่ามันจะย้อนมาทำร้ายเราตอน</p>

<div class="links">
<a href="https://www.instagram.com/01_24_s" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
<a href="https://www.facebook.com/share/14XgRhxJvo8/" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
<a href="https://line.me/ti/p/U7iqf2eNUt" target="_blank"><i class="fab fa-line"></i> LINE</a>
</div>

<div class="footer">อยากให้คุณรู้จักผม</div>

</div>

<script>
document.addEventListener("click", e => {
  const ripple = document.createElement("div");

  ripple.style.position = "fixed";
  ripple.style.left = e.clientX + "px";
  ripple.style.top = e.clientY + "px";
  ripple.style.width = "6px";
  ripple.style.height = "6px";
  ripple.style.borderRadius = "50%";
  ripple.style.background = "#3b82f6";
  ripple.style.transform = "translate(-50%, -50%) scale(1)";
  ripple.style.pointerEvents = "none";
  ripple.style.zIndex = "99999";
  ripple.style.transition = "all 0.8s ease";

  document.body.appendChild(ripple);

  requestAnimationFrame(() => {
    ripple.style.transform = "translate(-50%, -50%) scale(6)";
    ripple.style.opacity = "0";
  });

  setTimeout(() => ripple.remove(), 800);
});

setTimeout(()=>{
  const loader = document.querySelector(".loader");
  loader.style.opacity = "0";

  setTimeout(()=>{
    loader.style.display = "none";
    document.querySelector(".container").style.display = "block";
  },300);
},500);
</script>

</body>
</html>
